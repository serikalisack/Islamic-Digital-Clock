<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1b2a" id="theme-color-meta">
    <title>Islamic Digital Clock</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <main id="app">
        <section class="clock-container">
            <h1 id="clock"></h1>
            <p id="date"></p>
            <p id="hijri-date"></p>
            <p id="greeting"></p>
        </section>

        <section id="prayer-times" class="prayer-times"></section>

        <section class="controls">
            <label>
                <input type="checkbox" id="toggle-12-24">
                24 Hour Format
            </label>

            <label>
                <input type="checkbox" id="toggle-gregorian" checked>
                Show Gregorian Date
            </label>

            <label>
                <input type="checkbox" id="toggle-hijri" checked>
                Show Hijri Date
            </label>

            <label>
                <input type="checkbox" id="toggle-theme">
                Dark Mode
            </label>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
